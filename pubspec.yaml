name: vispa_digital
description: Sistema moderno para vispas/bingos rápidos do interior.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  firebase_analytics: ^10.7.0
  firebase_crashlytics: ^3.3.0
  firebase_performance: ^0.9.4

  # State Management
  provider: ^6.1.0
  riverpod: ^2.4.0
  hooks_riverpod: ^2.4.0

  # QR Code
  mobile_scanner: ^4.0.0
  qr_flutter: ^4.0.0

  # PDF
  pdf: ^3.10.0
  printing: ^5.11.0

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Network
  http: ^1.1.0
  connectivity_plus: ^5.0.0
  dio: ^5.3.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Utils
  intl: ^0.18.1
  get_it: ^7.6.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  uuid: ^4.0.0

  # UI
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  lottie: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  mockito: ^5.4.0
  test: ^1.24.0

  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
